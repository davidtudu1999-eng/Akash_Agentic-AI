<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#075E54"/>
<title>Akash Chat</title>

<style>
:root{
  --wa:#075E54;
  --bg:#e5ddd5;
  --card:#ffffff;
  --btn1:#d8eee4;
  --btnBorder:#8ea598;
  --text:#1f2d2a;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
}
.header{
  position:fixed;top:0;left:0;right:0;
  background:var(--wa);
  color:#fff;
  padding:20px;
  font-weight:900;
  font-size:26px;
}
.wrap{
  padding-top:110px;
  max-width:900px;
  margin:auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
  padding:20px;
}
.nameCard{
  background:#fff;
  border:2px solid var(--btnBorder);
  border-radius:22px;
  padding:20px;
  font-weight:800;
}
.aiMessage{
  background:#fff;
  border:2px solid var(--btnBorder);
  border-radius:22px;
  padding:20px;
  font-size:20px;
}
.aiButtons{
  width:100%;
  max-width:760px;
  display:flex;
  flex-direction:column;
  gap:14px;
}
.chatBtn{
  border:2px solid var(--btnBorder);
  border-radius:14px;
  background:var(--btn1);
  padding:16px;
  font-weight:800;
  cursor:pointer;
}
.busy{display:none;}
.busy.show{display:block;}
</style>
</head>

<body>

<div class="header">Akash at your Service</div>

<div class="wrap">
  <div id="advisorName" class="nameCard"></div>
  <div id="aiMessage" class="aiMessage">Hi, I am Akash!</div>
  <div id="aiButtons" class="aiButtons"></div>
  <div id="busy" class="busy">Akash is thinking...</div>
</div>

<script>

const AKASH_API_BASE = "https://api.tarachatbots.in";
const AKASH_AI_WEBHOOK = "https://api.tarachatbots.in/api/akash-ai";

const params = new URLSearchParams(window.location.search);

const advisorName = params.get("name") || "Advisor";
const advisorId = params.get("advisorId") || "";
const userName = params.get("userName") || "";

document.getElementById("advisorName").textContent = advisorName;

const aiMessage = document.getElementById("aiMessage");
const aiButtons = document.getElementById("aiButtons");
const busy = document.getElementById("busy");

function setBusy(flag){
  busy.classList.toggle("show", flag);
}

function clearButtons(){
  aiButtons.innerHTML = "";
}

function renderAIResponse(res){
  aiMessage.textContent = res.message || "Akash is ready.";
  clearButtons();

  (res.buttons || []).forEach(btn => {
    const b = document.createElement("button");
    b.className = "chatBtn";
    b.textContent = btn.label;
    b.onclick = () => handleClick(btn.value);
    aiButtons.appendChild(b);
  });
}

async function callAI(payload){
  const res = await fetch(AKASH_AI_WEBHOOK,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(payload)
  });
  return res.json();
}

async function startConversation(){
  setBusy(true);

  const res = await callAI({
    stage:"language-selection",
    pageType:"language-selection",
    language:"",
    advisorName,
    advisorId,
    userName,
    leadName:"",
    leadData:"",
    selectedStatus:"",
    messageBatchCount:1
  });

  renderAIResponse(res);
  setBusy(false);
}

async function handleClick(value){
  if(!value) return;

  localStorage.setItem("akash_language", value);

  const state = await fetch(`${AKASH_API_BASE}/api/akash-state/${advisorId}`)
    .then(r => r.json());

  if(state.nextPage === "goal-setting-required"){
    window.location.href = "akash-goal-required.html";
  }
  else if(state.nextPage === "upload-lead-supernova"){
    window.location.href = "akash-upload-leads.html";
  }
  else{
    window.location.href = "akash-choice.html";
  }
}

startConversation();

</script>
</body>
</html>
