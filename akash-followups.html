<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#075E54"/>
  <title>Follow-Ups</title>
  <style>
    :root{
      --wa:#075E54;
      --bg:#e5ddd5;
      --btn1:#d8eee4;
      --btnBorder:#8ea598;
      --text:#1f2d2a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    .header{
      position:fixed;top:0;left:0;right:0;z-index:3000;
      background:var(--wa);color:#fff;padding:20px;font-weight:900;font-size:26px;
    }
    .wrap{
      padding-top:110px;
      max-width:1000px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:28px;
      padding:18px 18px 40px;
    }
    .nameCard,.aiMessage,.emptyState{
      width:100%;
      max-width:860px;
      background:#fff;
      border:2px solid var(--btnBorder);
      border-radius:22px;
      padding:22px 20px;
    }
    .nameCard{
      max-width:320px;
      text-align:center;
      font-size:20px;
      font-weight:800;
    }
    .aiMessage{
      font-size:22px;
      line-height:1.5;
      white-space:pre-wrap;
    }
    .leadGrid{
      width:100%;
      max-width:960px;
      display:grid;
      grid-template-columns:repeat(4,minmax(150px,1fr));
      gap:22px 28px;
    }
    .leadBtn,.backBtn{
      width:100%;
      border:2px solid var(--btnBorder);
      border-radius:18px;
      background:var(--btn1);
      color:var(--text);
      font-weight:800;
      font-size:18px;
      padding:18px 14px;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.06);
    }
    .backWrap{width:100%;max-width:280px;}
    .busy{display:none;font-size:15px;font-weight:700;color:#45645d;}
    .busy.show{display:block;}
    .emptyState{display:none;text-align:center;font-weight:700;}
    .emptyState.show{display:block;}
    @media (max-width:900px){.leadGrid{grid-template-columns:repeat(2,minmax(140px,1fr));}}
    @media (max-width:760px){
      .nameCard{max-width:100%;}
      .aiMessage{font-size:18px;}
      .leadGrid{grid-template-columns:1fr;max-width:360px;}
    }
  </style>
</head>
<body>
  <div class="header">Akash at your Service</div>
  <div class="wrap">
    <div id="advisorName" class="nameCard">Advisor Name</div>
    <div id="aiMessage" class="aiMessage">Akash is getting today’s follow-up leads...</div>
    <div id="busy" class="busy">Akash is thinking...</div>
    <div id="leadGrid" class="leadGrid"></div>
    <div id="emptyState" class="emptyState">No follow-up leads available for today.</div>
    <div class="backWrap">
      <button id="backBtn" class="backBtn">Back</button>
    </div>
  </div>

  <script>
    const AKASH_API_BASE = "https://api.tarachatbots.in";

    const params = new URLSearchParams(window.location.search);

    const advisorName =
      params.get("name") ||
      params.get("advisorName") ||
      sessionStorage.getItem("akash_advisor_name") ||
      localStorage.getItem("akash_advisor_name") ||
      "Advisor Name";

    const advisorId =
      params.get("advisorId") ||
      params.get("userId") ||
      sessionStorage.getItem("akash_advisor_id") ||
      localStorage.getItem("akash_advisor_id") ||
      "";

    const userName =
      params.get("userName") ||
      params.get("managerName") ||
      sessionStorage.getItem("userName") ||
      localStorage.getItem("userName") ||
      "";

    document.getElementById("advisorName").textContent = advisorName;

    const aiMessageEl = document.getElementById("aiMessage");
    const busyEl = document.getElementById("busy");
    const leadGridEl = document.getElementById("leadGrid");
    const emptyStateEl = document.getElementById("emptyState");

    function setBusy(flag) {
      busyEl.classList.toggle("show", !!flag);
    }

    async function fetchFollowups() {
      if (!advisorId) throw new Error("Advisor ID missing.");
      const res = await fetch(`${AKASH_API_BASE}/api/followups/${encodeURIComponent(advisorId)}`);
      if (!res.ok) throw new Error("Unable to fetch follow-up leads.");
      const data = await res.json();
      return Array.isArray(data.leads) ? data.leads : [];
    }

    async function fetchAIMessage() {
      const res = await fetch(`${AKASH_API_BASE}/api/akash-ai`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          stage: "followups-page",
          pageType: "followups-page",
          language: localStorage.getItem("akash_language") || "",
          advisorName,
          advisorId,
          userName,
          leadName: "",
          leadData: "",
          selectedStatus: "",
          messageBatchCount: 1
        })
      });

      if (!res.ok) throw new Error("Unable to fetch AI message.");
      return res.json();
    }

    function renderLeads(leads) {
      leadGridEl.innerHTML = "";
      emptyStateEl.classList.remove("show");

      if (!Array.isArray(leads) || leads.length === 0) {
        emptyStateEl.classList.add("show");
        return;
      }

      leads.forEach((lead) => {
        const btn = document.createElement("button");
        btn.className = "leadBtn";
        btn.textContent = lead.lead_name || "Lead";

  const url = new URL("akash-lead-actions.html", window.location.href);
  url.searchParams.set("name", advisorName);
  if (advisorId) url.searchParams.set("advisorId", advisorId);
  if (userName) url.searchParams.set("userName", userName);
  if (lead.lead_id) url.searchParams.set("leadId", lead.lead_id);
  if (lead.lead_name) url.searchParams.set("leadName", lead.lead_name);

  const language = localStorage.getItem("akash_language");
  if (language) url.searchParams.set("language", language);

  window.location.href = url.toString();
};
        
        btn.onclick = () => {
          sessionStorage.setItem("akash_selected_lead", JSON.stringify(lead));
        };
        leadGridEl.appendChild(btn);
      });
    }

    async function initPage() {
      try {
        if (!advisorId) {
          aiMessageEl.textContent = "Advisor ID missing.";
          emptyStateEl.classList.add("show");
          emptyStateEl.textContent = "Advisor ID missing.";
          return;
        }

        setBusy(true);

        const [messageRes, leads] = await Promise.all([
          fetchAIMessage().catch(() => ({
            message: "These are your follow-up leads. Tap on any of these to decide further course of action."
          })),
          fetchFollowups()
        ]);

        aiMessageEl.textContent = messageRes.message || "These are your follow-up leads. Tap on any of these to decide further course of action.";
        renderLeads(leads);
      } catch (e) {
        aiMessageEl.textContent = e.message || "Unable to load follow-up leads.";
        emptyStateEl.classList.add("show");
        emptyStateEl.textContent = e.message || "Unable to load follow-up leads.";
      } finally {
        setBusy(false);
      }
    }

    document.getElementById("backBtn").onclick = () => history.back();

    initPage();
  </script>
</body>
</html>
