<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#075E54"/>
  <title>Akash Choice</title>
  <style>
    :root{
      --wa:#075E54;
      --bg:#e5ddd5;
      --card:#ffffff;
      --btn1:#d8eee4;
      --btnBorder:#8ea598;
      --text:#1f2d2a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    .header{
      position:fixed;top:0;left:0;right:0;z-index:3000;
      background:var(--wa);color:#fff;padding:20px;font-weight:900;font-size:26px;
    }
    .wrap{
      padding-top:110px;
      max-width:900px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:28px;
      padding-left:18px;
      padding-right:18px;
      padding-bottom:40px;
    }
    .nameCard{
      margin-top:22px;
      background:#fff;
      border:2px solid var(--btnBorder);
      border-radius:22px;
      min-width:320px;
      max-width:100%;
      padding:26px 24px;
      text-align:center;
      font-size:20px;
      font-weight:800;
    }
    .messageBox{
      width:100%;
      max-width:760px;
      background:#fff;
      border:2px solid var(--btnBorder);
      border-radius:22px;
      padding:22px 20px;
      font-size:22px;
      line-height:1.5;
      font-weight:500;
      white-space:pre-wrap;
    }
    .btnRow{
      width:100%;
      max-width:760px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }
    .btn{
      width:100%;
      border:2px solid var(--btnBorder);
      border-radius:18px;
      background:var(--btn1);
      color:var(--text);
      font-weight:800;
      font-size:18px;
      padding:18px 14px;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.06);
      display:none;
    }
    .btn.show{display:block;}
    .busy{
      display:none;
      font-size:15px;
      font-weight:700;
      color:#45645d;
    }
    .busy.show{display:block;}
    @media (max-width:760px){
      .messageBox{font-size:18px;}
      .nameCard{min-width:0;width:100%;}
    }
  </style>
</head>
<body>
  <div class="header">Akash at your Service</div>

  <div class="wrap">
    <div id="advisorName" class="nameCard">Advisor Name</div>
    <div id="messageBox" class="messageBox">Loading...</div>

    <div class="btnRow" id="btnRow">
      <button id="freshBtn" class="btn">Fresh Leads</button>
      <button id="followBtn" class="btn">Follow-Ups</button>
      <button id="backBtn" class="btn">Back</button>
    </div>

    <div id="busy" class="busy">Akash is thinking...</div>
  </div>

  <script>
    const AKASH_AI_WEBHOOK = "https://api.tarachatbots.in/api/akash-ai";

    const params = new URLSearchParams(window.location.search);
    const advisorName = params.get("name") || params.get("advisorName") || "Advisor Name";
    const advisorId = params.get("advisorId") || params.get("userId") || "";
    const userName =
      params.get("userName") ||
      params.get("managerName") ||
      sessionStorage.getItem("userName") ||
      localStorage.getItem("userName") ||
      "";
    const language =
      params.get("language") ||
      localStorage.getItem("akash_language") ||
      "english";

    document.getElementById("advisorName").textContent = advisorName;

    function buildUrl(page) {
      const url = new URL(page, window.location.href);
      url.searchParams.set("name", advisorName);
      if (advisorId) url.searchParams.set("advisorId", advisorId);
      if (userName) url.searchParams.set("userName", userName);
      if (language) url.searchParams.set("language", language);
      return url.toString();
    }

    function setBusy(flag) {
      document.getElementById("busy").classList.toggle("show", !!flag);
    }

    async function callAI(payload) {
      const res = await fetch(AKASH_AI_WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const text = await res.text().catch(() => "");
        throw new Error(text || "Unable to reach Akash AI");
      }
      return res.json();
    }

    function showButtons() {
      const ids = ["freshBtn", "followBtn", "backBtn"];
      ids.forEach((id, index) => {
        setTimeout(() => {
          document.getElementById(id).classList.add("show");
        }, index * 180);
      });
    }

    async function initPage() {
      try {
        setBusy(true);

        const response = await callAI({
          stage: "fresh-or-followups",
          language:
            localStorage.getItem("akash_language") || "english",
          advisorName,
          advisorId,
          userName
        });

        document.getElementById("messageBox").textContent =
          response.message || `What would you prefer for ${advisorName} today?`;

        showButtons();
      } catch (e) {
        document.getElementById("messageBox").textContent =
          `What would you prefer for ${advisorName} today?`;
        showButtons();
      } finally {
        setBusy(false);
      }
    }

    document.getElementById("freshBtn").onclick = () => {
      window.location.href = buildUrl("akash-fresh-leads.html");
    };

    document.getElementById("followBtn").onclick = () => {
      window.location.href = buildUrl("akash-followups.html");
    };

    document.getElementById("backBtn").onclick = () => {
      history.back();
    };

    initPage();
  </script>
</body>
</html>
