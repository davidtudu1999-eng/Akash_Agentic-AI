<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#075E54"/>
  <title>Sarthi Advisor Page</title>
  <style>
    :root{
      --wa:#075E54;
      --bg:#e5ddd5;
      --card:#ffffff;
      --btn1:#d8eee4;
      --btnBorder:#8ea598;
      --text:#1f2d2a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    .header{
      position:fixed;top:0;left:0;right:0;z-index:3000;
      background:var(--wa);color:#fff;padding:20px;font-weight:900;font-size:26px;
    }
    .wrap{
      padding-top:110px;
      max-width:900px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:34px;
      padding-left:18px;
      padding-right:18px;
      padding-bottom:40px;
    }
    .nameCard{
      margin-top:22px;
      background:var(--card);
      border:2px solid var(--btnBorder);
      border-radius:22px;
      min-width:320px;
      max-width:100%;
      padding:26px 24px;
      text-align:center;
      font-size:20px;
      font-weight:800;
      box-shadow:0 1px 0 rgba(0,0,0,.04);
    }
    .grid{
      width:100%;
      display:grid;
      grid-template-columns:repeat(2,minmax(170px,250px));
      gap:26px 34px;
      align-items:center;
      justify-content:center;
      margin-top:8px;
    }
    .grid.bottom{
      max-width:560px;
      margin-bottom:30px;
    }
    .actionBtn{
      width:100%;
      max-width:250px;
      border:2px solid var(--btnBorder);
      border-radius:18px;
      background:var(--btn1);
      color:var(--text);
      font-weight:800;
      font-size:18px;
      padding:18px 14px;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.06);
    }
    .actionBtn:active{
      transform:translateY(1px);
      box-shadow:0 3px 0 rgba(0,0,0,.06);
    }
    .hint{
      font-size:14px;
      opacity:.75;
      margin-top:-18px;
      text-align:center;
    }
    .loading{
      display:none;
      font-size:15px;
      font-weight:700;
      color:#45645d;
      margin-top:-16px;
    }

    .aiPanel{
      display:none;
      width:100%;
      max-width:760px;
      background:transparent;
      margin-top:-10px;
    }
    .aiPanel.show{
      display:block;
    }
    .aiMessage{
      background:var(--card);
      border:2px solid var(--btnBorder);
      border-radius:22px;
      padding:22px 20px;
      font-size:22px;
      line-height:1.55;
      font-weight:500;
      margin-bottom:22px;
      box-shadow:0 1px 0 rgba(0,0,0,.04);
      white-space:pre-wrap;
    }
    .aiButtons{
      display:flex;
      flex-wrap:wrap;
      gap:16px 18px;
      justify-content:center;
    }
    .chatBtn{
      border:2px solid var(--btnBorder);
      border-radius:18px;
      background:var(--btn1);
      color:var(--text);
      font-weight:800;
      font-size:18px;
      padding:16px 18px;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.06);
      min-width:180px;
      display:none;
    }
    .chatBtn.show{
      display:inline-block;
    }
    .chatBtn:active{
      transform:translateY(1px);
      box-shadow:0 3px 0 rgba(0,0,0,.06);
    }
    .aiBusy{
      display:none;
      text-align:center;
      font-size:15px;
      font-weight:700;
      color:#45645d;
      margin-top:6px;
    }
    .aiBusy.show{
      display:block;
    }

    @media (max-width: 760px){
      .grid{
        grid-template-columns:1fr;
        max-width:320px;
      }
      .grid.bottom{
        grid-template-columns:1fr;
        max-width:320px;
      }
      .nameCard{
        min-width:0;
        width:100%;
      }
      .aiMessage{
        font-size:18px;
      }
      .chatBtn{
        width:100%;
        min-width:0;
      }
      .aiButtons{
        flex-direction:column;
        align-items:stretch;
      }
    }
  </style>
</head>
<body>
  <div class="header">Akash at your Service</div>

  <div class="wrap">
    <div id="advisorName" class="nameCard">Advisor Name</div>

    <div class="grid">
      <button id="goalSettingBtn" class="actionBtn">Goal Setting</button>
      <button id="callBtn" class="actionBtn">Call</button>
      <button id="askAkashBtn" class="actionBtn">Ask Akash</button>
      <button id="dailyTrackingBtn" class="actionBtn">Daily Tracking</button>
    </div>

    <div id="aiPanel" class="aiPanel">
      <div id="aiMessage" class="aiMessage">Hi, I am Akash!</div>
      <div id="aiButtons" class="aiButtons"></div>
      <div id="aiBusy" class="aiBusy">Akash is thinking...</div>
    </div>

    <div class="grid bottom">
      <button id="backBtn" class="actionBtn">Back</button>
      <button id="advisorListBtn" class="actionBtn">Advisor's List</button>
    </div>

    <div id="loadingText" class="loading">Checking Akash status...</div>
    <div class="hint">Advisor name is read automatically from the page link.</div>
  </div>

  <script>
    const APPS_SCRIPT_URL =
      localStorage.getItem("SCRIPT_URL") ||
      "https://script.google.com/macros/s/AKfycbxZ9Kpu0wpj8ONHE4FTOmeHigxt_wdhh3K97RWXTQ8mqjz9Hl6Er-iXJff-qu62kMtZHw/exec";

    const AKASH_API_BASE =
      localStorage.getItem("AKASH_API_BASE") ||
      "https://api.tarachatbots.in";

    const AKASH_AI_WEBHOOK =
      "http://api.tarachatbots.in/api/akash-ai";

    const params = new URLSearchParams(window.location.search);
    const advisorName = params.get("name") || params.get("advisorName") || "Advisor Name";
    const advisorId = params.get("userId") || params.get("advisorId") || "";
    const userName =
      params.get("userName") ||
      params.get("managerName") ||
      sessionStorage.getItem("userName") ||
      localStorage.getItem("userName") ||
      "";

    const advisorNameEl = document.getElementById("advisorName");
    const aiPanel = document.getElementById("aiPanel");
    const aiMessage = document.getElementById("aiMessage");
    const aiButtons = document.getElementById("aiButtons");
    const aiBusy = document.getElementById("aiBusy");
    const loadingText = document.getElementById("loadingText");

    advisorNameEl.textContent = advisorName;

    function buildAdvisorUrl(page) {
      const url = new URL(page, window.location.href);
      url.searchParams.set("name", advisorName);
      if (advisorId) url.searchParams.set("advisorId", advisorId);
      if (userName) url.searchParams.set("userName", userName);
      return url.toString();
    }

    async function apiGet(payload) {
      const url = APPS_SCRIPT_URL + "?" + new URLSearchParams(payload).toString();
      const res = await fetch(url, { method: "GET" });
      if (!res.ok) throw new Error("Network error");
      return JSON.parse(await res.text());
    }

    async function fetchAkashState() {
      if (!advisorId) throw new Error("Advisor ID missing");
      const res = await fetch(`${AKASH_API_BASE}/api/akash-state/${encodeURIComponent(advisorId)}`);
      if (!res.ok) throw new Error("Unable to fetch Akash state");
      return res.json();
    }

    function showAIPanel() {
      aiPanel.classList.add("show");
      aiPanel.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function setAIBusy(flag) {
      aiBusy.classList.toggle("show", !!flag);
    }

    function clearAIButtons() {
      aiButtons.innerHTML = "";
    }

    function renderAIResponse(response) {
      aiMessage.textContent = response.message || "Akash is ready.";
      clearAIButtons();

      const buttons = Array.isArray(response.buttons) ? response.buttons : [];
      buttons.forEach((btn, index) => {
        const button = document.createElement("button");
        button.className = "chatBtn";
        button.textContent = btn.label || btn.value || "Continue";
        button.onclick = () => handleAIButtonClick(btn.value || btn.action || "");
        aiButtons.appendChild(button);

        setTimeout(() => {
          button.classList.add("show");
        }, index * 220);
      });
    }

    async function callAI(payload) {
      const res = await fetch(AKASH_AI_WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        throw new Error("Unable to reach Akash AI");
      }

      return res.json();
    }

    async function startAkashConversation() {
      try {
        if (!advisorId) {
          alert("Advisor ID missing in page link.");
          return;
        }

        showAIPanel();
        setAIBusy(true);
        clearAIButtons();
        aiMessage.textContent = "Hi, I am Akash!";

        const response = await callAI({
          stage: "language-selection",
          language: "",
          advisorName,
          advisorId,
          userName
        });

        renderAIResponse(response);
      } catch (e) {
        alert(e.message || "Unable to start Akash AI.");
      } finally {
        setAIBusy(false);
      }
    }

    async function handleAIButtonClick(value) {
      try {
        if (!value) return;

        const languageValues = [
          "english", "hindi", "hinglish", "marathi",
          "bengali", "tamil", "telugu", "assamese"
        ];

        if (languageValues.includes(value)) {
          localStorage.setItem("akash_language", value);

          setAIBusy(true);
          clearAIButtons();

          const state = await fetchAkashState();

          let stage = "fresh-or-followups";
          if (!state.goalDone) {
            stage = "goal-setting-required";
          } else if (state.goalDone && !state.leadUploaded) {
            stage = "upload-required";
          }

          const response = await callAI({
            stage,
            language: value,
            advisorName: state.advisorName || advisorName,
            advisorId,
            userName,
            goalDone: !!state.goalDone,
            leadUploaded: !!state.leadUploaded
          });

          renderAIResponse(response);
          return;
        }

        if (value === "goal_setting") {
          window.location.href = buildAdvisorUrl("goal-setting.html");
          return;
        }

        if (value === "upload_lead_supernova") {
          window.location.href = buildAdvisorUrl("akash-upload-leads.html");
          return;
        }

        if (value === "fresh_leads") {
          window.location.href = buildAdvisorUrl("akash-fresh-leads.html");
          return;
        }

        if (value === "followups") {
          window.location.href = buildAdvisorUrl("akash-followups.html");
          return;
        }

        if (value === "back") {
          aiPanel.classList.remove("show");
          return;
        }
      } catch (e) {
        alert(e.message || "Unable to continue Akash flow.");
      } finally {
        setAIBusy(false);
      }
    }

    document.getElementById("goalSettingBtn").addEventListener("click", () => {
      window.location.href = buildAdvisorUrl("goal-setting.html");
    });

    document.getElementById("dailyTrackingBtn").addEventListener("click", () => {
      window.location.href = buildAdvisorUrl("daily-tracking.html");
    });

    document.getElementById("callBtn").addEventListener("click", async () => {
      try {
        const result = await apiGet({
          action: "getAdvisorPhone",
          advisorName: advisorName
        });

        if (!result.ok || !result.phone) {
          alert(result.message || "Unable to fetch phone number.");
          return;
        }

        const phone = String(result.phone).trim();

        try {
          await navigator.clipboard.writeText(phone);
        } catch (e) {
          const ta = document.createElement("textarea");
          ta.value = phone;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          ta.remove();
        }

        try {
          await apiGet({
            action: "logCall",
            advisorName: advisorName,
            phone: phone,
            userName: userName,
            details: "Dialer opened"
          });
        } catch (e) {}

        if (confirm("Number copied. Open Dialer?")) {
          window.location.href = "tel:" + phone;
        }
      } catch (e) {
        alert("Unable to fetch phone number.");
      }
    });

    document.getElementById("askAkashBtn").addEventListener("click", async () => {
      startAkashConversation();
    });

    document.getElementById("backBtn").addEventListener("click", () => {
      history.back();
    });

    document.getElementById("advisorListBtn").addEventListener("click", () => {
      history.back();
    });

    window.SARTHI_ADVISOR_CONTEXT = { advisorName, advisorId, userName };
  </script>
</body>
</html>
