<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#075E54"/>
<title>Lead Actions</title>

<style>
:root{
  --wa:#075E54;
  --bg:#e5ddd5;
  --btn:#d8eee4;
  --border:#8ea598;
}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}
.header{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--wa);
  color:#fff;
  padding:18px;
  font-size:24px;
  font-weight:900;
}
.wrap{
  padding-top:100px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}
.card{
  background:#fff;
  border:2px solid var(--border);
  border-radius:20px;
  padding:20px;
  width:90%;
  max-width:600px;
  text-align:center;
}
.btnRow{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:center;
}
.btn{
  background:var(--btn);
  border:2px solid var(--border);
  padding:15px;
  border-radius:14px;
  font-weight:800;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">Akash at your Service</div>

<div class="wrap">

<div id="leadName" class="card">Lead Name</div>

<div id="aiMessage" class="card">Loading...</div>

<div class="btnRow">
<button id="marketingBtn" class="btn">Marketing Material</button>
<button id="customBtn" class="btn">Customized Message</button>
<button id="callBtn" class="btn">Call</button>
<button id="statusBtn" class="btn">Lead Status</button>
<button id="backBtn" class="btn">Back</button>
</div>

</div>

<script>

const AI_URL = "https://api.tarachatbots.in/api/akash-ai";

const params = new URLSearchParams(window.location.search);

const leadName = params.get("leadName") || "Lead";
const advisorName = params.get("name") || "";
const advisorId = params.get("advisorId") || "";
const userName = params.get("userName") || "";
const language = params.get("language") || localStorage.getItem("akash_language") || "english";

document.getElementById("leadName").innerText = leadName;

async function loadAI() {
  try {
    const res = await fetch(AI_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        pageType:"lead-action-page",
        language,
        leadName,
        advisorName,
        advisorId,
        userName
      })
    });

    const data = await res.json();
    document.getElementById("aiMessage").innerText =
      data.message || "Choose next action";

  } catch(e){
    document.getElementById("aiMessage").innerText =
      "Choose next action";
  }
}

loadAI();

/* 🔥 IMPORTANT — THIS IS YOUR FIX */
document.getElementById("customBtn").onclick = () => {
  const url = new URL("akash-customized-message.html", window.location.href);

  url.searchParams.set("leadName", leadName);
  url.searchParams.set("name", advisorName);
  url.searchParams.set("advisorId", advisorId);
  url.searchParams.set("userName", userName);
  url.searchParams.set("language", language);

  window.location.href = url.toString();
};

document.getElementById("backBtn").onclick = () => history.back();

</script>

</body>
</html>
