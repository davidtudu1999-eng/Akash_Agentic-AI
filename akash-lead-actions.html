<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#075E54"/>
  <title>Customized Message</title>
  <style>
    :root{
      --wa:#075E54;
      --bg:#e5ddd5;
      --card:#ffffff;
      --botBubble:#dcf8c6;
      --btn1:#d8eee4;
      --btnBorder:#8ea598;
      --text:#1f2d2a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    .header{
      position:fixed;
      top:0; left:0; right:0;
      z-index:3000;
      background:var(--wa);
      color:#fff;
      padding:20px;
      font-weight:900;
      font-size:26px;
    }
    .wrap{
      padding-top:110px;
      max-width:900px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      gap:20px;
      padding-left:18px;
      padding-right:18px;
      padding-bottom:40px;
    }
    .nameCard{
      align-self:center;
      background:#fff;
      border:2px solid var(--btnBorder);
      border-radius:22px;
      min-width:320px;
      max-width:100%;
      padding:22px 24px;
      text-align:center;
      font-size:20px;
      font-weight:800;
    }
    .chatArea{
      display:flex;
      flex-direction:column;
      gap:16px;
      width:100%;
    }
    .botBubble{
      align-self:flex-start;
      max-width:82%;
      background:var(--botBubble);
      border:2px solid var(--btnBorder);
      border-radius:18px 18px 18px 6px;
      padding:18px 18px;
      font-size:20px;
      line-height:1.5;
      font-weight:700;
      white-space:pre-wrap;
      box-shadow:0 3px 0 rgba(0,0,0,.05);
    }
    .msgWrap{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-self:flex-start;
      width:min(82%, 760px);
    }
    .msgCard{
      background:var(--card);
      border:2px solid var(--btnBorder);
      border-radius:18px 18px 18px 6px;
      padding:18px 18px;
      font-size:18px;
      line-height:1.55;
      white-space:pre-wrap;
      box-shadow:0 3px 0 rgba(0,0,0,.05);
    }
    .msgActions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .miniBtn{
      min-width:130px;
      border:2px solid var(--btnBorder);
      border-radius:14px;
      background:var(--btn1);
      color:var(--text);
      font-weight:800;
      font-size:15px;
      padding:12px 14px;
      cursor:pointer;
      box-shadow:0 3px 0 rgba(0,0,0,.05);
    }
    .busy{
      display:none;
      font-size:15px;
      font-weight:700;
      color:#45645d;
      text-align:center;
    }
    .busy.show{display:block;}
    .bottomRow{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:12px;
    }
    .actionBtn{
      min-width:180px;
      border:2px solid var(--btnBorder);
      border-radius:18px;
      background:var(--btn1);
      color:var(--text);
      font-weight:800;
      font-size:18px;
      padding:18px 14px;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.06);
    }
    .actionBtn:active,
    .miniBtn:active{
      transform:translateY(1px);
    }
    @media (max-width:760px){
      .nameCard{
        min-width:0;
        width:100%;
      }
      .botBubble,
      .msgWrap{
        width:100%;
        max-width:100%;
      }
      .botBubble{
        font-size:18px;
      }
      .msgCard{
        font-size:17px;
      }
    }
  </style>
</head>
<body>
  <div class="header">Akash at your Service</div>

  <div class="wrap">
    <div id="leadNameCard" class="nameCard">Lead Name</div>

    <div class="chatArea">
      <div id="introBubble" class="botBubble">Here are your Icebreaking Messages</div>
      <div id="busy" class="busy">Akash is preparing message suggestions...</div>
      <div id="messagesContainer"></div>
    </div>

    <div class="bottomRow">
      <button id="moreBtn" class="actionBtn">More</button>
      <button id="backBtn" class="actionBtn">Back</button>
    </div>
  </div>

  <script>
    const AKASH_AI_WEBHOOK = "https://api.tarachatbots.in/api/akash-ai";

    const params = new URLSearchParams(window.location.search);

    const advisorName =
      params.get("name") ||
      params.get("advisorName") ||
      sessionStorage.getItem("akash_advisor_name") ||
      localStorage.getItem("akash_advisor_name") ||
      "Advisor Name";

    const advisorId =
      params.get("advisorId") ||
      params.get("userId") ||
      sessionStorage.getItem("akash_advisor_id") ||
      localStorage.getItem("akash_advisor_id") ||
      "";

    const userName =
      params.get("userName") ||
      params.get("managerName") ||
      sessionStorage.getItem("userName") ||
      localStorage.getItem("userName") ||
      "";

    const language =
      params.get("language") ||
      localStorage.getItem("akash_language") ||
      "english";

    const selectedLeadRaw =
      sessionStorage.getItem("akash_selected_lead") ||
      localStorage.getItem("akash_selected_lead");

    let selectedLead = {};
    try {
      selectedLead = selectedLeadRaw ? JSON.parse(selectedLeadRaw) : {};
    } catch (e) {
      selectedLead = {};
    }

    const leadName =
      params.get("leadName") ||
      selectedLead.lead_name ||
      selectedLead.leadName ||
      "Lead Name";

    const leadId =
      params.get("leadId") ||
      selectedLead.lead_id ||
      selectedLead.leadId ||
      "";

    const leadSource =
      params.get("leadSource") ||
      selectedLead.leadSource ||
      "";

    const leadNameCard = document.getElementById("leadNameCard");
    const busyEl = document.getElementById("busy");
    const introBubble = document.getElementById("introBubble");
    const messagesContainer = document.getElementById("messagesContainer");

    leadNameCard.textContent = leadName;

    let messageBatchCount = 1;
    let allMessages = [];

    function setBusy(flag) {
      busyEl.classList.toggle("show", !!flag);
    }

    async function callAI(payload) {
      const res = await fetch(AKASH_AI_WEBHOOK, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const text = await res.text().catch(() => "");
        throw new Error(text || "Unable to reach Akash AI");
      }

      return res.json();
    }

    function renderMessages() {
      messagesContainer.innerHTML = "";

      allMessages.forEach((message, index) => {
        const wrap = document.createElement("div");
        wrap.className = "msgWrap";

        const card = document.createElement("div");
        card.className = "msgCard";
        card.textContent = message;

        const actions = document.createElement("div");
        actions.className = "msgActions";

        const shareBtn = document.createElement("button");
        shareBtn.className = "miniBtn";
        shareBtn.textContent = "Share";
        shareBtn.onclick = async () => {
          try {
            if (navigator.share) {
              await navigator.share({ text: message });
            } else {
              await navigator.clipboard.writeText(message);
              alert("Message copied. You can paste and share it.");
            }
          } catch (e) {}
        };

        const copyBtn = document.createElement("button");
        copyBtn.className = "miniBtn";
        copyBtn.textContent = "Copy Message";
        copyBtn.onclick = async () => {
          try {
            await navigator.clipboard.writeText(message);
            alert("Message copied.");
          } catch (e) {
            alert("Unable to copy message.");
          }
        };

        actions.appendChild(shareBtn);
        actions.appendChild(copyBtn);

        wrap.appendChild(card);
        wrap.appendChild(actions);

        messagesContainer.appendChild(wrap);
      });
    }

    async function loadInitialMessages() {
      try {
        setBusy(true);

        const response = await callAI({
          stage: "customized-action-page",
          pageType: "customized-action-page",
          language,
          advisorName,
          advisorId,
          userName,
          leadName,
          leadData: JSON.stringify({
            leadId,
            leadSource,
            tier: selectedLead.tier || "",
            status: selectedLead.status || "",
            phone: selectedLead.phone || "",
            email: selectedLead.email || ""
          }),
          selectedStatus: selectedLead.status || "",
          messageBatchCount
        });

        introBubble.textContent =
          response.message || "Here are your Icebreaking Messages";

        const messages = Array.isArray(response.suggestedMessages)
          ? response.suggestedMessages
          : [];

        allMessages = messages.slice(0, 3);
        renderMessages();
      } catch (e) {
        introBubble.textContent = "Here are your Icebreaking Messages";
        allMessages = [];
        renderMessages();
      } finally {
        setBusy(false);
      }
    }

    async function loadOneMoreMessage() {
      try {
        setBusy(true);
        messageBatchCount += 1;

        const response = await callAI({
          stage: "customized-action-page",
          pageType: "customized-action-page",
          language,
          advisorName,
          advisorId,
          userName,
          leadName,
          leadData: JSON.stringify({
            leadId,
            leadSource,
            tier: selectedLead.tier || "",
            status: selectedLead.status || "",
            phone: selectedLead.phone || "",
            email: selectedLead.email || ""
          }),
          selectedStatus: selectedLead.status || "",
          messageBatchCount
        });

        const messages = Array.isArray(response.suggestedMessages)
          ? response.suggestedMessages
          : [];

        const nextMessage = messages.find(msg => msg && !allMessages.includes(msg));

        if (nextMessage) {
          allMessages.push(nextMessage);
          renderMessages();
        }
      } catch (e) {
      } finally {
        setBusy(false);
      }
    }

    document.getElementById("moreBtn").addEventListener("click", loadOneMoreMessage);
    document.getElementById("backBtn").addEventListener("click", () => history.back());

    loadInitialMessages();
  </script>
</body>
</html>
