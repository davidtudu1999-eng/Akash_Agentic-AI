<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="theme-color" content="#075E54"/>
<title>Customized Messages</title>

<style>
:root{
  --wa:#075E54;
  --bg:#e5ddd5;
  --card:#fff;
  --border:#8ea598;
  --btn:#d8eee4;
}
body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
}
.header{
  position:fixed;
  top:0;left:0;right:0;
  background:var(--wa);
  color:#fff;
  padding:18px;
  font-size:24px;
  font-weight:900;
}
.wrap{
  padding-top:100px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}
.chatHeader{
  background:#dcf8c6;
  padding:14px;
  border-radius:12px;
  font-weight:800;
}
.msg{
  background:#fff;
  border:2px solid var(--border);
  padding:14px;
  border-radius:14px;
  width:90%;
  max-width:600px;
}
.btnRow{
  display:flex;
  gap:10px;
  margin-top:10px;
}
.btn{
  background:var(--btn);
  border:2px solid var(--border);
  padding:8px 12px;
  border-radius:10px;
  font-weight:700;
  cursor:pointer;
}
.bottom{
  margin-top:20px;
}
.loading{
  font-weight:700;
  color:#45645d;
}
</style>
</head>

<body>

<div class="header">Akash at your Service</div>

<div class="wrap">
  <div class="chatHeader">Here are your Icebreaking Messages</div>

  <div id="loading" class="loading">Generating messages...</div>
  <div id="messagesContainer"></div>

  <div class="bottom">
    <button id="moreBtn" class="btn">More</button>
    <button id="backBtn" class="btn">Back</button>
  </div>
</div>

<script>

const AI_URL = "https://api.tarachatbots.in/api/akash-ai";

const params = new URLSearchParams(window.location.search);

const leadName = params.get("leadName") || "";
const advisorName = params.get("name") || "";
const advisorId = params.get("advisorId") || "";
const userName = params.get("userName") || "";
const language = params.get("language") || localStorage.getItem("akash_language") || "english";

function copyMsg(text){
  navigator.clipboard.writeText(text);
  alert("Copied");
}

function shareMsg(text){
  if (navigator.share){
    navigator.share({ text });
  } else {
    alert("Sharing not supported");
  }
}

function renderMessages(messages){
  const container = document.getElementById("messagesContainer");
  container.innerHTML = "";

  messages.forEach(msg => {
    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
      <div>${msg}</div>
      <div class="btnRow">
        <button class="btn">Copy</button>
        <button class="btn">Share</button>
      </div>
    `;

    const buttons = div.querySelectorAll(".btn");
    buttons[0].onclick = () => copyMsg(msg);
    buttons[1].onclick = () => shareMsg(msg);

    container.appendChild(div);
  });
}

async function loadMessages(){
  try{
    document.getElementById("loading").style.display = "block";

    const res = await fetch(AI_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        pageType:"customized-action-page",
        stage:"customized-action-page",
        language,
        leadName,
        advisorName,
        advisorId,
        userName,
        messageBatchCount:1
      })
    });

    const data = await res.json();

    console.log("AI Response:", data);

    // ✅ HANDLE ALL POSSIBLE STRUCTURES
    const raw = Array.isArray(data) ? data[0]?.json : data;

    const msgs =
      raw?.output?.suggestedMessages ||
      raw?.suggestedMessages ||
      [];

    if (!msgs.length){
      document.getElementById("messagesContainer").innerHTML =
        "<div class='msg'>No messages generated</div>";
      return;
    }

    renderMessages(msgs);

  }catch(e){
    console.error(e);
    alert("Error loading messages");
  }finally{
    document.getElementById("loading").style.display = "none";
  }
}

document.getElementById("moreBtn").onclick = loadMessages;
document.getElementById("backBtn").onclick = () => history.back();

// Initial load
loadMessages();

</script>

</body>
</html>
