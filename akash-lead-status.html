<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="theme-color" content="#075E54"/>
  <title>Lead Status</title>
  <style>
    :root{
      --wa:#075E54;
      --bg:#e5ddd5;
      --btn1:#d8eee4;
      --btnBorder:#8ea598;
      --text:#1f2d2a;
      --selected:#9fd4b9;
      --selectedBorder:#5f9b7d;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
    }
    .header{
      position:fixed;
      top:0; left:0; right:0;
      z-index:3000;
      background:var(--wa);
      color:#fff;
      padding:20px;
      font-weight:900;
      font-size:26px;
    }
    .wrap{
      padding-top:110px;
      max-width:1100px;
      margin:0 auto;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:28px;
      padding-left:18px;
      padding-right:18px;
      padding-bottom:40px;
    }
    .leadNameCard{
      margin-top:12px;
      background:#fff;
      border:2px solid var(--btnBorder);
      border-radius:22px;
      min-width:320px;
      max-width:100%;
      padding:26px 24px;
      text-align:center;
      font-size:20px;
      font-weight:800;
    }
    .messageBox{
      width:100%;
      max-width:760px;
      background:#fff;
      border:2px solid var(--btnBorder);
      border-radius:22px;
      padding:26px 22px;
      font-size:22px;
      line-height:1.45;
      font-weight:500;
      text-align:center;
      white-space:pre-wrap;
    }
    .statusGrid{
      width:100%;
      max-width:1050px;
      display:grid;
      grid-template-columns:repeat(5, minmax(140px, 1fr));
      gap:22px 24px;
      align-items:center;
    }
    .bottomRow{
      width:100%;
      max-width:480px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
    }
    .statusBtn,.actionBtn{
      width:100%;
      border:2px solid var(--btnBorder);
      border-radius:18px;
      background:var(--btn1);
      color:var(--text);
      font-weight:800;
      font-size:18px;
      padding:18px 14px;
      cursor:pointer;
      box-shadow:0 4px 0 rgba(0,0,0,.06);
    }
    .statusBtn.selected{
      background:var(--selected);
      border-color:var(--selectedBorder);
    }
    .statusBtn:active,.actionBtn:active{
      transform:translateY(1px);
      box-shadow:0 3px 0 rgba(0,0,0,.06);
    }
    .busy{
      display:none;
      font-size:15px;
      font-weight:700;
      color:#45645d;
    }
    .busy.show{display:block;}
    @media (max-width:980px){
      .statusGrid{
        grid-template-columns:repeat(3, minmax(140px, 1fr));
      }
    }
    @media (max-width:760px){
      .leadNameCard{
        min-width:0;
        width:100%;
      }
      .messageBox{
        font-size:18px;
      }
      .statusGrid{
        grid-template-columns:repeat(2, minmax(140px, 1fr));
        max-width:420px;
      }
      .bottomRow{
        grid-template-columns:1fr;
        max-width:320px;
      }
    }
    @media (max-width:480px){
      .statusGrid{
        grid-template-columns:1fr;
        max-width:320px;
      }
    }
  </style>
</head>
<body>
  <div class="header">Akash at your Service</div>

  <div class="wrap">
    <div id="leadNameCard" class="leadNameCard">Lead Name</div>

    <div class="messageBox">
      Based on your latest interaction with the client, how would you rate this lead?
    </div>

    <div id="busy" class="busy">Saving status...</div>

    <div class="statusGrid">
      <button class="statusBtn" data-value="Hot">Hot</button>
      <button class="statusBtn" data-value="Neutral">Neutral</button>
      <button class="statusBtn" data-value="Cold">Cold</button>
      <button class="statusBtn" data-value="Lost">Lost</button>
      <button class="statusBtn" data-value="Policy Sold">Policy Sold</button>
    </div>

    <div class="bottomRow">
      <button id="submitBtn" class="actionBtn">Submit</button>
      <button id="backBtn" class="actionBtn">Back</button>
    </div>
  </div>

  <script>
    const AKASH_API_BASE = "https://api.tarachatbots.in";

    const params = new URLSearchParams(window.location.search);

    const advisorId =
      params.get("advisorId") ||
      params.get("userId") ||
      sessionStorage.getItem("akash_advisor_id") ||
      localStorage.getItem("akash_advisor_id") ||
      "";

    const selectedLeadRaw =
      sessionStorage.getItem("akash_selected_lead") ||
      localStorage.getItem("akash_selected_lead");

    let selectedLead = {};
    try {
      selectedLead = selectedLeadRaw ? JSON.parse(selectedLeadRaw) : {};
    } catch (e) {
      selectedLead = {};
    }

    const leadName =
      params.get("leadName") ||
      selectedLead.lead_name ||
      selectedLead.leadName ||
      "Lead Name";

    const leadId =
      params.get("leadId") ||
      selectedLead.lead_id ||
      selectedLead.leadId ||
      "";

    let selectedStatus =
      params.get("status") ||
      selectedLead.status ||
      "";

    const leadNameCard = document.getElementById("leadNameCard");
    const busyEl = document.getElementById("busy");
    const statusButtons = Array.from(document.querySelectorAll(".statusBtn"));

    leadNameCard.textContent = leadName;

    function setBusy(flag) {
      busyEl.classList.toggle("show", !!flag);
    }

    function renderSelectedStatus() {
      statusButtons.forEach((btn) => {
        btn.classList.toggle("selected", btn.dataset.value === selectedStatus);
      });
    }

    statusButtons.forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedStatus = btn.dataset.value;
        renderSelectedStatus();
      });
    });

    async function submitLeadStatus() {
      if (!advisorId) {
        alert("Advisor ID missing.");
        return;
      }

      if (!leadId) {
        alert("Lead ID missing.");
        return;
      }

      if (!selectedStatus) {
        alert("Please select a status.");
        return;
      }

      try {
        setBusy(true);

        const res = await fetch(`${AKASH_API_BASE}/api/lead-action`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            leadId,
            advisorId,
            actionType: "Lead Status",
            actionValue: selectedStatus,
            status: selectedStatus
          })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data?.error || data?.details || "Unable to save lead status.");
        }

        selectedLead.status = selectedStatus;
        sessionStorage.setItem("akash_selected_lead", JSON.stringify(selectedLead));
        localStorage.setItem("akash_selected_lead", JSON.stringify(selectedLead));

        alert("Lead status updated successfully.");
      } catch (e) {
        alert(e.message || "Unable to save lead status.");
      } finally {
        setBusy(false);
      }
    }

    document.getElementById("submitBtn").addEventListener("click", submitLeadStatus);
    document.getElementById("backBtn").addEventListener("click", () => {
      history.back();
    });

    renderSelectedStatus();
  </script>
</body>
</html>
